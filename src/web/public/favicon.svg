<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Vault body -->
  <rect x="8" y="14" width="42" height="42" rx="5" fill="#1B3A6B" stroke="#0D1B2A" stroke-width="2"/>
  <!-- Vault door -->
  <rect x="15" y="20" width="30" height="30" rx="3" fill="#3B6CB5"/>
  <!-- Hinge lines -->
  <rect x="9" y="22" width="3" height="8" rx="1.5" fill="#3B6CB5"/>
  <rect x="9" y="38" width="3" height="8" rx="1.5" fill="#3B6CB5"/>
  <!-- Vault dial (gold) -->
  <circle cx="30" cy="35" r="9" fill="#E8A838"/>
  <!-- Dial dots -->
  <circle cx="25.5" cy="32" r="2.2" fill="#1B3A6B"/>
  <circle cx="34.5" cy="32" r="2.2" fill="#1B3A6B"/>
  <circle cx="30" cy="39.5" r="2.2" fill="#1B3A6B"/>
  <!-- Sparkle lines -->
  <line x1="50" y1="10" x2="55" y2="5" stroke="#E8A838" stroke-width="3" stroke-linecap="round"/>
  <line x1="55" y1="14" x2="60" y2="10" stroke="#E8A838" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="52" y1="20" x2="58" y2="18" stroke="#E8A838" stroke-width="2" stroke-linecap="round"/>
</svg>
