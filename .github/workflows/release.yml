name: Release

on:
  push:
    branches: [main]

jobs:
  # ── Calculate next semantic version ──────────────────────────────
  version:
    name: Semantic Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history needed for tag + commit analysis

      - name: Calculate version
        id: version
        run: |
          chmod +x scripts/version.sh
          VERSION=$(./scripts/version.sh)
          if [ "$VERSION" = "skip" ]; then
            echo "version=skip" >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No version-bumping commits found. Skipping release."
          else
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Next version: $VERSION"
          fi

  # ── Backend: test + build + push ─────────────────────────────────
  release-backend:
    name: Release Backend
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore
        working-directory: src/api/GeekVault.Api

      - name: Build
        run: dotnet build -c Release --no-restore
        working-directory: src/api/GeekVault.Api

      - name: Test with coverage
        run: |
          dotnet test -c Release \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:CoverletOutput=./coverage/ \
            /p:ThresholdType=line \
            /p:Threshold=90 \
            /p:ExcludeByFile="**/Migrations/*.cs"
        working-directory: src/api/GeekVault.Api.Tests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./src/api
          file: ./src/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/geekvault-api:${{ needs.version.outputs.new_version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/geekvault-api:latest

  # ── Frontend: test + build + push ────────────────────────────────
  release-frontend:
    name: Release Frontend
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/web

      - name: Typecheck
        run: npx tsc -b
        working-directory: src/web

      - name: Test with coverage
        run: npm run test:coverage
        working-directory: src/web

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./src/web
          file: ./src/web/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/geekvault-web:${{ needs.version.outputs.new_version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/geekvault-web:latest

  # ── Create git tag ───────────────────────────────────────────────
  tag:
    name: Create Git Tag
    needs: [version, release-backend, release-frontend]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git tag ${{ needs.version.outputs.new_version }}
          git push origin ${{ needs.version.outputs.new_version }}
